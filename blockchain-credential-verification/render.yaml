services:
  - type: web
    name: blockcred-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # User will provide this in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PINATA_JWT
        sync: false # User will provide this
      - key: PINATA_GATEWAY
        sync: false # User will provide this
      - key: ETHEREUM_RPC_URL
        sync: false # User will provide this
      - key: PRIVATE_KEY
        sync: false # User will provide this
      - key: CONTRACT_ADDRESS
        sync: false # User will provide this
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
